<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Clone</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 420px;
            max-height: 820px;
            background: #2d4c1e;
            border: 4px solid #333;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const W = 420;
        const H = 820;
        canvas.width = W;
        canvas.height = H;

        const arenaMargin = 30;
        const arenaW = W - (arenaMargin * 2);
        const arenaTop = 80;
        const arenaBottom = 180;
        const arenaH = H - arenaTop - arenaBottom;

        // --- NOVA VARIÁVEL DE ESTADO DE TELA ---
        let currentScreen = 'MAIN_MENU'; // Começa no Menu

        // --- SISTEMA DE FASES E TEMPO ---
        let lastTime = Date.now();
        let timeAccumulator = 0;
        let gamePhase = 'NORMAL';

        let gameState = {
            elixir: 5,
            timer: 180,
            blueScore: 0,
            redScore: 0,
            battleDeck: [],
            selectedCardId: null,
            openingChestData: null
        };

        let playerData = {
            userName: 'O Jotta',
            level: 1,
            exp: 49,
            clan: null,
            gold: 10,
            diamant: 1000,
            arena: 0,
            crown: 0,
            treinamento: true,
            trofeus: 0,
            wins: 2,
            chest: [
                {
                    id: 1,
                    name: 'Baú Velho',
                    type: 'comum',
                    status: 'WAITING',
                    timer: 180,
                    maxTime: 180
                },
            ],
            deck: [
                { id: 1, name: 'Knight', icon: '⚔️' },
                { id: 2, name: 'Giant', icon: '🛡️' },
                { id: 3, name: 'Archer', icon: '🏹' },
                { id: 4, name: 'Fireball', icon: '🔥' },
                { id: 5, name: 'Goblins', icon: '👺' },
                { id: 6, name: 'Wolf', icon: '🐺' }
            ],
        };

        const COLORS = {
            grass1: '#6eb344', grass2: '#5e9c3a', river: '#309ec9', bridge: '#8b4513',
            blue: '#2196F3', red: '#F44336', elixir: '#f50057', gold: '#FFD700',
            uiBg: 'rgba(20, 20, 20, 0.95)',
            menuBg1: '#1b4169', menuBg2: '#163657', loadingBar: '#4CAF50'
        };

        // --- ADICIONE ESTE OBJETO DE BOTÕES ---
        const buttons = {
            battle: { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 70 }
        };

        // --- CONFIGURAÇÃO DA TELA DE CARREGAMENTO ---
        let loadingProgress = 0;
        let opacity = 0; // Para efeito de fade in inicial
        const bgLoading = new Image();
        bgLoading.src = 'https://i.pinimg.com/736x/fd/7a/bf/fd7abf8e304a4f6042b5e77b91834c05.jpg'; // Nome do arquivo da montanha
        // --- CARREGAMENTO DE IMAGENS DO BAÚ ---
        const imgChestClosed = new Image();
        imgChestClosed.src = 'assets/chests/comum_close.png';

        const imgChestOpen = new Image();
        imgChestOpen.src = 'assets/chests/comum_open.png';

        const imgGold = new Image();
        imgGold.src = 'assets/icons/gold_icon.png';

        const imgGems = new Image();
        imgGems.src = 'assets/icons/gem_icon.png';

        const imgExp = new Image();
        imgExp.src = 'assets/icons/exp_icon.png';

        const TROOP_STATS = {
            // --- TANQUES ---
            'Giant': {
                hp: 3200, damage: 12, speed: 0.6, range: 45, cost: 5, icon: '🛡️',
                targetType: 'BUILDING', description: 'Foca apenas em torres. Muita vida.'
            },
            'Golem': {
                hp: 5000, damage: 15, speed: 0.4, range: 50, cost: 8, icon: '🗿',
                targetType: 'BUILDING', description: 'O maior tanque do jogo.'
            },

            // --- MINI TANQUES E DEFESA ---
            'Knight': {
                hp: 1450, damage: 18, speed: 0.9, range: 35, cost: 3, icon: '⚔️',
                targetType: 'ALL', description: 'Bom custo-benefício para defesa.'
            },
            'Valkyrie': {
                hp: 1600, damage: 15, speed: 0.9, range: 40, cost: 4, icon: '🪓',
                targetType: 'ALL', description: 'Excelente contra hordas (Goblins/Squeletos).'
            },

            // --- SUPORTE E DISTÂNCIA ---
            'Archer': {
                hp: 250, damage: 10, speed: 1.0, range: 150, cost: 3, icon: '🏹',
                targetType: 'ALL', description: 'Ataca de longe, mas morre fácil.'
            },
            'Musketeer': {
                hp: 600, damage: 35, speed: 0.8, range: 180, cost: 4, icon: '🔫',
                targetType: 'ALL', description: 'Alto dano e longo alcance.'
            },

            // --- DANO PESADO (ANTI-TANQUE) ---
            'MiniPEKKA': {
                hp: 1100, damage: 60, speed: 1.2, range: 35, cost: 4, icon: '🤖',
                targetType: 'ALL', description: 'Lenta para bater, mas mata tanques rápido.'
            },

            // --- HORDAS E VELOCIDADE ---
            'Goblins': {
                hp: 170, damage: 12, speed: 1.4, range: 30, cost: 2, icon: '👺',
                targetType: 'ALL', description: 'Rápidos e baratos.'
            },
            'Skeletons': {
                hp: 70, damage: 7, speed: 1.1, range: 30, cost: 1, icon: '💀',
                targetType: 'ALL', description: 'Usados para distrair tropas pesadas.'
            },
            'Wolf': {
                hp: 450, damage: 22, speed: 1.6, range: 35, cost: 4, icon: '🐺',
                targetType: 'ALL', description: 'Unidade de elite muito veloz.'
            },

            // --- FEITIÇOS ---
            'Fireball': {
                hp: 1, damage: 180, speed: 0, range: 0, cost: 4, icon: '🔥',
                targetType: 'AREA', description: 'Dano instantâneo em área.'
            }
        };

        let troops = [];
        let towers = [
            { x: W / 2, y: arenaTop + 40, team: 'red', isKing: true, level: 10, hp: 2500, maxHp: 2500, isDestroyed: false },
            { x: arenaMargin + arenaW * 0.15 + 25, y: arenaTop + 100, team: 'red', isKing: false, level: 10, hp: 1500, maxHp: 1500, isDestroyed: false },
            { x: arenaMargin + arenaW * 0.85 - 25, y: arenaTop + 100, team: 'red', isKing: false, level: 10, hp: 1500, maxHp: 1500, isDestroyed: false },

            { x: W / 2, y: arenaTop + arenaH - 40, team: 'blue', isKing: true, level: 9, hp: 2500, maxHp: 2500, isDestroyed: false },
            { x: arenaMargin + arenaW * 0.15 + 25, y: arenaTop + arenaH - 100, team: 'blue', isKing: false, level: 9, hp: 1500, maxHp: 1500, isDestroyed: false },
            { x: arenaMargin + arenaW * 0.85 - 25, y: arenaTop + arenaH - 100, team: 'blue', isKing: false, level: 9, hp: 1500, maxHp: 1500, isDestroyed: false }
        ];

        class Troop {
            constructor(x, y, team, type) {
                this.x = x; this.y = y; this.team = team; this.type = type;
                this.stats = { ...TROOP_STATS[type] };
                this.hp = this.stats.hp;
                this.radius = 16;
                this.target = null;
            }

            update() {
                if (this.hp <= 0 || gamePhase === 'END') return;

                // Filtra inimigos baseado no tipo de alvo da tropa
                let enemies;
                if (this.stats.targetType === 'BUILDING') {
                    // Tropas tipo Gigante focam apenas em torres
                    enemies = towers.filter(t => t.team !== this.team && t.hp > 0);
                } else {
                    // Tropas normais focam em tudo
                    enemies = [
                        ...towers.filter(t => t.team !== this.team && t.hp > 0),
                        ...troops.filter(t => t.team !== this.team && t.hp > 0)
                    ];
                }

                if (enemies.length === 0) return;

                this.target = enemies.reduce((closest, current) => {
                    return Math.hypot(this.x - closest.x, this.y - closest.y) < Math.hypot(this.x - current.x, this.y - current.y) ? closest : current;
                });

                const dist = Math.hypot(this.target.x - this.x, this.target.y - this.y);
                if (dist > this.stats.range) {
                    let moveX = this.target.x;
                    let moveY = this.target.y;
                    const riverY = arenaTop + arenaH / 2;
                    const onMySide = (this.team === 'blue' && this.y > riverY) || (this.team === 'red' && this.y < riverY);
                    const targetOnOtherSide = (this.team === 'blue' && this.target.y < riverY) || (this.team === 'red' && this.target.y > riverY);

                    if (onMySide && targetOnOtherSide) {
                        const leftBridgeX = arenaMargin + arenaW * 0.15 + 25;
                        const rightBridgeX = arenaMargin + arenaW * 0.85 - 25;
                        moveX = Math.abs(this.x - leftBridgeX) < Math.abs(this.x - rightBridgeX) ? leftBridgeX : rightBridgeX;
                        moveY = riverY;
                    }

                    const angle = Math.atan2(moveY - this.y, moveX - this.x);
                    this.x += Math.cos(angle) * this.stats.speed;
                    this.y += Math.sin(angle) * this.stats.speed;
                } else {
                    this.target.hp -= this.stats.damage;
                }

                this.x = Math.max(arenaMargin + this.radius, Math.min(W - arenaMargin - this.radius, this.x));
                this.y = Math.max(arenaTop + this.radius, Math.min(arenaTop + arenaH - this.radius, this.y));
            }

            draw() {
                ctx.fillStyle = this.team === 'blue' ? COLORS.blue : COLORS.red;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = 'white'; ctx.font = "16px Arial"; ctx.textAlign = "center";
                ctx.fillText(this.stats.icon, this.x, this.y + 6);
                ctx.fillStyle = 'black'; ctx.fillRect(this.x - 10, this.y - 22, 20, 4);
                ctx.fillStyle = this.team === 'blue' ? '#4CAF50' : '#f44336';
                ctx.fillRect(this.x - 10, this.y - 22, 20 * (Math.max(0, this.hp) / this.stats.hp), 4);
            }
        }

        // --- FUNÇÃO PARA PROCESSAR O FIM DA PARTIDA ---
        function endGame() {
            if (gamePhase === 'END') return; // Evita rodar duas vezes
            gamePhase = 'END';

            const isVictory = gameState.blueScore > gameState.redScore;
            const playerTowersLeft = towers.filter(t => t.team === 'blue' && t.hp > 0).length;
            const totalCoroas = gameState.blueScore + playerTowersLeft;

            // Cálculos de Recompensa
            if (isVictory) {
                const moedas = 150 + (totalCoroas * 10);

                // Atualizando os dados do jogador (UMA ÚNICA VEZ)
                playerData.wins += 1;
                playerData.gold += moedas;
                playerData.crown += totalCoroas;
                playerData.exp += 30; // Ganha um pouco de exp
                checkLevelUp();
                playerData.trofeus += 30; // Ganha troféus

                // Dar um baú se houver espaço
                if (playerData.chest.length < 4) {
                    // Novo baú ganho:
                    playerData.chest.push({
                        id: Date.now(),
                        name: 'Baú Velho',
                        type: 'comum',
                        status: 'WAITING', // Começa esperando clique
                        timer: 180,        // 3 minutos (em segundos)
                        maxTime: 180       // Guardamos o total para a barra de progresso
                    });
                }

                // Salva as moedas e coroas ganhas no gameState para a tela de resultados exibir
                gameState.lastReward = { moedas, coroas: totalCoroas };

            } else {
                const moedas = 30 + (gameState.blueScore * 15);
                playerData.gold += moedas;
                playerData.crown += gameState.blueScore; // Só ganha as coroas que derrubou
                playerData.trofeus = Math.max(0, playerData.trofeus - 20); // Perde troféus, mas não fica negativo
                playerData.exp += 10; // Mesmo perdendo ganha um pouco de XP
                checkLevelUp();

                gameState.lastReward = { moedas, coroas: gameState.blueScore };
            }
        }

        // --- LÓGICA DE GERENCIAMENTO DA PARTIDA ---
        function checkTowers() {
            towers.forEach(t => {
                if (t.hp <= 0 && !t.isDestroyed) {
                    t.isDestroyed = true;
                    if (t.team === 'red') {
                        gameState.blueScore += t.isKing ? 3 : 1;
                        if (t.isKing) gameState.blueScore = 3;
                    } else {
                        gameState.redScore += t.isKing ? 3 : 1;
                        if (t.isKing) gameState.redScore = 3;
                    }
                    if (gamePhase === 'OVERTIME' || gamePhase === 'TIEBREAKER' || t.isKing) {
                        endGame(); // Chama a nova função aqui
                    }
                }
            });
        }

        function updateGameLogic() {
            let now = Date.now();
            let dt = now - lastTime;
            lastTime = now;

            if (gamePhase === 'END') return;

            if (gamePhase === 'NORMAL' || gamePhase === 'OVERTIME') {
                timeAccumulator += dt;
                if (timeAccumulator >= 1000) {
                    gameState.timer--;
                    timeAccumulator -= 1000;

                    if (gameState.timer <= 0) {
                        if (gamePhase === 'NORMAL') {
                            if (gameState.blueScore !== gameState.redScore) {
                                endGame(); // Chama a nova função aqui
                            } else {
                                gamePhase = 'OVERTIME';
                                gameState.timer = 30;
                            }
                        } else if (gamePhase === 'OVERTIME') {
                            gamePhase = 'TIEBREAKER';
                        }
                    }
                }
            }

            if (gamePhase === 'TIEBREAKER') {
                towers.forEach(t => {
                    if (t.hp > 0) t.hp -= 5;
                });
            }

            checkTowers();

            if (gameState.elixir < 10) gameState.elixir += 0.02;
        }

        // --- INPUT DE JOGADOR ---
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            if (currentScreen === 'LOADING') {
                // Coordenadas do botão cancelar definidas na função draw
                const btnX = (W - 160) / 2;
                const btnY = (H * 0.75) + 60;

                if (x > btnX && x < btnX + 160 && y > btnY && y < btnY + 45) {
                    loadingProgress = 0;
                    currentScreen = 'MAIN_MENU'; // Volta ao menu se cancelar
                }
                return;
            }

            // ===== LÓGICA DA TELA INICIAL =====
            if (currentScreen === 'MAIN_MENU') {
                // Coordenadas do Botão Batalha desenhado no Menu
                const btnW = 200;
                const btnH = 70;
                const btnX = W / 2 - btnW / 2;
                const btnY = H / 2 + 50;

                // Clicou no botão de batalha?
                if (x > btnX && x < btnX + btnW && y > btnY && y < btnY + btnH) {
                    loadingProgress = 0; // Resetar progresso
                    currentScreen = 'LOADING'; // Vai para o loading antes da batalha
                }

                const slotW = 85;
                const slotH = 110;
                const slotY = 620;
                const spacing = (W - (slotW * 4)) / 5;

                // Verifica se o clique foi na altura dos baús
                if (y > slotY && y < slotY + slotH) {
                    for (let i = 0; i < 4; i++) {
                        let bx = spacing + i * (slotW + spacing);
                        if (x > bx && x < bx + slotW) {
                            const bau = playerData.chest[i]; // Pegamos do array original
                            if (!bau) return;

                            if (bau.status === 'WAITING') {
                                // Só permite abrir um por vez (estilo Clash Royale)
                                const jaTemAlguemAbrindo = playerData.chest.some(b => b.status === 'OPENING');
                                if (!jaTemAlguemAbrindo) {
                                    bau.status = 'OPENING';
                                } else {
                                    alert("Você já está desbloqueando um baú!");
                                }
                            } else if (bau.status === 'READY') {
                                collectChest(i); // Função que dá ouro/gemas e remove do array
                            }
                        }
                    }
                }
                return; // Impede que o clique faça outras coisas
            }

            // ===== LÓGICA DA BATALHA (Seu código original) =====
            if (currentScreen === 'BATTLE') {
                const deckState = getDeckState();

                if (gamePhase === 'END') {
                    const btnY = H - 150;
                    const btnW = 160;
                    const btnH = 50;
                    if (x > (W / 2 - btnW / 2) && x < (W / 2 + btnW / 2) &&
                        y > (btnY - btnH / 2) && y < (btnY + btnH / 2)) {
                        resetGameToMenu();
                    }
                    return;
                }

                // Seleção de Carta na Mão
                if (y > H - 160) {
                    deckState.hand.forEach((card, i) => {
                        const cardX = 85 + (i * 82), cardY = H - 110;
                        if (x >= cardX && x <= cardX + 75 && y >= cardY && y <= cardY + 100) {
                            gameState.selectedCardId = card.id; // Armazena o ID da carta
                        }
                    });
                    return;
                }

                // Drop da Carta na Arena
                const riverY = arenaTop + arenaH / 2;
                if (gameState.selectedCardId !== null && y > riverY && y < arenaTop + arenaH && x > arenaMargin && x < W - arenaMargin) {

                    // CORREÇÃO: Encontra a carta no battleDeck (estado atual da partida)
                    const card = gameState.battleDeck.find(c => c.id === gameState.selectedCardId);

                    if (card && gameState.elixir >= card.cost) {
                        troops.push(new Troop(x, y, 'blue', card.name));
                        gameState.elixir -= card.cost;

                        const usedSlot = card.slot; // Agora pega o slot correto embaralhado!

                        // Rotação apenas no deck da partida
                        gameState.battleDeck.forEach(c => {
                            if (c.id === gameState.selectedCardId) {
                                c.slot = 6;
                            } else if (c.slot > usedSlot) {
                                c.slot -= 1;
                            }
                        });

                        gameState.selectedCardId = null;
                    }
                }
            }
            if (currentScreen === 'CHEST_ANIMATION') {
                gameState.openingChestData.step++;
                gameState.openingChestData.shake = 10; // Faz tremer ao clicar
                setTimeout(() => gameState.openingChestData.shake = 0, 100);

                // Se as recompensas acabaram
                if (gameState.openingChestData.step > gameState.openingChestData.rewards.length) {
                    const data = gameState.openingChestData;

                    // Aplica os valores reais ao perfil apenas no final
                    playerData.gold += data.rewards[0].val;
                    playerData.diamant += data.rewards[1].val;
                    playerData.exp += data.rewards[2].val;
                    checkLevelUp();

                    // Remove o baú
                    playerData.chest.splice(data.chestIndex, 1);

                    // Volta para o menu
                    gameState.openingChestData = null;
                    currentScreen = 'MAIN_MENU';
                }
                return; // Impede outros cliques
            }
        });

        // --- FUNÇÃO PARA DESENHAR A TELA DE CARREGAMENTO ---
        function drawLoadingScreen() {
            // 1. Desenhar Fundo (Imagem ou cor caso falhe)
            if (bgLoading.complete) {
                ctx.drawImage(bgLoading, 0, 0, W, H);
            } else {
                ctx.fillStyle = '#001a33';
                ctx.fillRect(0, 0, W, H);
            }

            // 2. Overlay escuro para destacar o texto
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, W, H);

            // 3. Barra de Carregamento
            const barW = 300;
            const barH = 20;
            const barX = (W - barW) / 2;
            const barY = H * 0.75;

            // Fundo da barra
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, 10);
            ctx.fill();

            // Progresso
            ctx.fillStyle = COLORS.blue;
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW * (loadingProgress / 100), barH, 10);
            ctx.fill();

            // Texto de Porcentagem
            ctx.fillStyle = "white";
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.fillText(`${Math.floor(loadingProgress)}%`, W / 2, barY - 10);

            // 4. Botão Cancelar
            const btnW = 160;
            const btnH = 45;
            const btnX = (W - btnW) / 2;
            const btnY = barY + 60;

            ctx.fillStyle = COLORS.red;
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(btnX, btnY, btnW, btnH, 10);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "bold 18px Arial";
            ctx.fillText("CANCELAR", W / 2, btnY + 28);

            // Lógica de Progressão
            if (loadingProgress < 100) {
                loadingProgress += 0.8; // Velocidade do carregamento
            } else {
                initializeBattleDeck();
                currentScreen = 'BATTLE'; // Transição ao chegar em 100%
                lastTime = Date.now();
            }
        }

        function getProcessedPlayerData() {
            // Cálculo de XP (ex: cada nível precisa de level * 50 de exp)
            const nextLevelExp = playerData.level * 100;
            // Garante que a porcentagem não passe de 100% visualmente
            const expPercentage = Math.min(playerData.exp / nextLevelExp, 1);

            // Progresso de Treinamento (vitórias / 7)
            const trainingProgress = playerData.wins / 7;

            // --- VERIFICAÇÃO DA ARENA ---
            // Se for 0, o nome é "TREINAMENTO", caso contrário, "ARENA " + o número
            const arenaName = playerData.arena === 0 ? "TREINAMENTO" : "ARENA " + playerData.arena;

            return {
                ...playerData,
                nextLevelExp,
                expPercentage,
                trainingProgress,
                arenaName, // Novo campo processado
                clanName: playerData.clan || 'SEM CLÃ',
                chestSlots: Array.from({ length: 4 }, (_, i) => playerData.chest[i] || null)
            };
        }

        function checkLevelUp() {
            // Calculamos o XP necessário com base na mesma fórmula da UI
            let nextLevelExp = playerData.level * 100;

            // Enquanto o XP for maior que o necessário para o próximo nível
            while (playerData.exp >= nextLevelExp) {
                playerData.exp -= nextLevelExp; // Remove o XP usado para subir de nível
                playerData.level++;             // Sobe o nível

                // Atualiza o próximo limite (opcional: a dificuldade aumenta a cada nível)
                nextLevelExp = playerData.level * 100;

                console.log("LEVEL UP! Agora você está no nível " + playerData.level);
                // Aqui você poderia adicionar sons ou efeitos visuais de level up
            }
        }

        function updateChestTimers() {
            const agora = Date.now();
            const delta = (agora - lastTime) / 1000; // segundos que passaram

            playerData.chest.forEach(bau => {
                if (bau.status === 'OPENING') {
                    bau.timer -= delta;
                    if (bau.timer <= 0) {
                        bau.timer = 0;
                        bau.status = 'READY';
                    }
                }
            });
        }

        function collectChest(index) {
            const chest = playerData.chest[index];
            if (chest.status !== 'READY') return;

            // Calculamos as recompensas antecipadamente para a animação
            const gold = Math.floor(Math.random() * 50) + 50;
            const gems = Math.floor(Math.random() * 2) + 1;

            // Iniciamos o estado da animação
            gameState.openingChestData = {
                step: 0, // 0: Baú fechado, 1: Ouro, 2: Gemas, 3: XP/Final
                rewards: [
                    { type: 'GOLD', val: gold, icon: '💰' },
                    { type: 'GEMS', val: gems, icon: '💎' },
                    { type: 'EXP', val: 15, icon: '✨' }
                ],
                chestIndex: index,
                scale: 1,
                shake: 0
            };

            currentScreen = 'CHEST_ANIMATION'; // Novo estado de tela
        }

        function drawChestOpening() {
            // 1. Fundo Quadriculado Azul (Mantendo sua lógica de tiles)
            const tileSize = 45;
            for (let y = 0; y < H; y += tileSize) {
                for (let x = 0; x < W; x += tileSize) {
                    ctx.fillStyle = ((Math.floor(x / tileSize) + Math.floor(y / tileSize)) % 2 === 0) ? COLORS.menuBg1 : COLORS.menuBg2;
                    ctx.fillRect(x, y, tileSize, tileSize);
                    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    ctx.strokeRect(x, y, tileSize, tileSize);
                }
            }

            // 2. Fundo escurecido (Overlay)
            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, W, H);

            const centerX = W / 2;
            const centerY = H / 2;

            // Efeito de brilho atrás do baú
            const gradient = ctx.createRadialGradient(centerX, centerY, 10, centerX, centerY, 180);
            gradient.addColorStop(0, 'rgba(241, 196, 15, 0.4)');
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 180, 0, Math.PI * 2);
            ctx.fill();

            // 3. O Baú com animação (IMAGEM)
            ctx.save();
            let shakeX = (Math.random() - 0.5) * gameState.openingChestData.shake;
            ctx.translate(centerX + shakeX, centerY + 20); // Ajuste leve na altura

            // Escolhe a imagem: Fechado no step 0, Aberto nos outros
            const chestImg = gameState.openingChestData.step === 0 ? imgChestClosed : imgChestOpen;
            const chestSize = 200;

            ctx.drawImage(chestImg, -chestSize / 2, -chestSize / 2, chestSize, chestSize);
            ctx.restore();

            // 4. Exibir Recompensa Atual (IMAGEM + TEXTO)
            if (gameState.openingChestData.step > 0 && gameState.openingChestData.step <= gameState.openingChestData.rewards.length) {
                const reward = gameState.openingChestData.rewards[gameState.openingChestData.step - 1];

                // Seleciona a imagem correta baseada no tipo
                let rewardImg;
                if (reward.type === 'GOLD') rewardImg = imgGold;
                else if (reward.type === 'GEMS') rewardImg = imgGems;
                else if (reward.type === 'EXP') rewardImg = imgExp;

                ctx.save();
                // Animação de "pulo" flutuante
                const bounce = Math.sin(Date.now() / 200) * 12;
                ctx.translate(centerX, centerY - 140 + bounce);

                // Desenha a imagem da recompensa
                const itemSize = 100;
                ctx.drawImage(rewardImg, -itemSize / 2, -itemSize / 2, itemSize, itemSize);

                // Texto da recompensa (com contorno para destaque)
                ctx.fillStyle = 'white';
                ctx.strokeStyle = 'black';
                ctx.lineWidth = 5;
                ctx.font = 'bold 34px Arial';
                ctx.textAlign = 'center';
                ctx.strokeText(`+${reward.val}`, 0, 90);
                ctx.fillText(`+${reward.val}`, 0, 90);
                ctx.restore();
            }

            // Instrução
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(255,255,255,0.7)';
            ctx.font = 'bold 16px Arial';
            ctx.fillText("TOQUE PARA REVELAR", centerX, H - 100);
        }

        function initializeBattleDeck() {
            // 1. Copiamos as cartas e injetamos o custo real vindo do TROOP_STATS
            let tempDeck = playerData.deck.map(card => {
                // Busca o custo no TROOP_STATS usando o nome da carta
                const realStats = TROOP_STATS[card.name];
                return {
                    ...card,
                    // Se a tropa existir no stats, usa o custo de lá, senão mantém o original
                    cost: realStats ? realStats.cost : card.cost
                };
            });

            // 2. Algoritmo de Fisher-Yates (Embaralhamento)
            for (let i = tempDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tempDeck[i], tempDeck[j]] = [tempDeck[j], tempDeck[i]];
            }

            // 3. Atribuímos os slots
            tempDeck.forEach((card, index) => {
                card.slot = index + 1;
            });

            gameState.battleDeck = tempDeck;
            console.log(gameState);
        }

        function getDeckState() {
            // Como agora usamos slots temporários na batalha, ordenamos eles
            const sorted = [...gameState.battleDeck].sort((a, b) => a.slot - b.slot);

            return {
                hand: sorted.filter(c => c.slot <= 4),
                next: sorted.find(c => c.slot === 5),
                queue: sorted.find(c => c.slot === 6)
            };
        }

            // 1. Desenhar a PRÓXIMA CARTA (Slot 5) - No canto esquerdo
            if (deckState.next) {
                drawCard(15, H - 95, deckState.next, true, false);
            }

            // 2. Desenhar a MÃO (Slots 1 a 4)
            deckState.hand.forEach((card, i) => {
                // i vai de 0 a 3. O slot original da carta define a posição na tela
                // Para manter a posição fixa na tela mesmo quando as cartas rodam:
                const posX = 85 + (i * 82);
                const posY = H - 110;

                // Verifica se esta carta específica é a selecionada
                // Usamos o ID para comparar, já que o índice do array muda
                const isSelected = gameState.selectedCardId === card.id;

                drawCard(posX, posY, card, false, isSelected);
            });
        }

        function drawCrownCounter(x, y, score, color) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.strokeStyle = color; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(x, y, 40, 50, 8); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.textAlign = "left"; ctx.fillText(score, x + 12, y + 25);
            ctx.font = "14px Arial"; ctx.fillText("👑", x + 10, y + 43);
        }

        function drawCard(x, y, card, isSmall, isSelected) {
            const w = isSmall ? 50 : 75, h = isSmall ? 65 : 100;
            ctx.fillStyle = '#5d6d7e'; ctx.strokeStyle = isSelected ? COLORS.gold : 'white'; ctx.lineWidth = isSelected ? 4 : 2;
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill(); ctx.stroke(); ctx.lineWidth = 2;
            ctx.fillStyle = '#8e44ad'; ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.font = "bold 10px Arial"; ctx.textAlign = "left"; ctx.fillText(card.cost, x - 3, y + 4);
            ctx.font = isSmall ? "22px Arial" : "36px Arial"; ctx.fillText(card.icon, x + w / 2 - (isSmall ? 11 : 18), y + h / 2 + (isSmall ? 8 : 12));
        }

        // --- NOVO LOOP PRINCIPAL COM SELEÇÃO DE TELA ---
        function render() {

            ctx.clearRect(0, 0, W, H);

            if (currentScreen === 'LOADING') {
                drawLoadingScreen();
            } else if (currentScreen === 'MAIN_MENU') {
                updateChestTimers();
                drawMainMenu(); // Renderiza o Menu
            } else if (currentScreen === 'BATTLE') {
                // Seu código original de renderizar a partida
                updateGameLogic();

                drawArena();

                towers.forEach(t => {
                    if (!t.isDestroyed) drawTower(t.x, t.y, t.team, t.isKing, t.level, t.hp, t.maxHp);
                });

                troops.forEach((t, index) => {
                    t.update();
                    t.draw();
                    if (t.hp <= 0) troops.splice(index, 1);
                });

                drawUI();

                if (gamePhase === 'END') {
                    drawEndScreen();
                }
            } else if (currentScreen === 'CHEST_ANIMATION') {
                drawChestOpening();
            }

            requestAnimationFrame(render);
        }

        render();
    </script>
</body>
