<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Clash Royale JS - Com Menu Inicial</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
        }

        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Black', sans-serif;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            max-width: 420px;
            max-height: 820px;
            background: #2d4c1e;
            border: 4px solid #333;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const W = 420;
        const H = 820;
        canvas.width = W;
        canvas.height = H;

        const arenaMargin = 30;
        const arenaW = W - (arenaMargin * 2);
        const arenaTop = 80;
        const arenaBottom = 180;
        const arenaH = H - arenaTop - arenaBottom;

        // --- NOVA VARIÁVEL DE ESTADO DE TELA ---
        let currentScreen = 'MAIN_MENU'; // Começa no Menu

        // --- SISTEMA DE FASES E TEMPO ---
        let lastTime = Date.now();
        let timeAccumulator = 0;
        let gamePhase = 'NORMAL';

        let gameState = {
            elixir: 5,
            timer: 180,
            blueScore: 0,
            redScore: 0,
            battleDeck: [],
            selectedCardId: null,
        };

        let playerData = {
            userName: 'O Jotta',
            level: 1,
            exp: 49,
            clan: null,
            gold: 10,
            diamant: 1000,
            arena: 0,
            crown: 0,
            treinamento: true,
            trofeus: 0,
            wins: 2,
            chest: [
                { id: 1, type: 'comum', name: 'Grande Baú' },
            ],
            deck: [
                { id: 1, name: 'Knight', cost: 3, icon: '⚔️' },
                { id: 2, name: 'Giant', cost: 5, icon: '🛡️' },
                { id: 3, name: 'Archer', cost: 3, icon: '🏹' },
                { id: 4, name: 'Fireball', cost: 4, icon: '🔥' },
                { id: 5, name: 'Goblins', cost: 2, icon: '👺' },
                { id: 6, name: 'Wolf', cost: 3, icon: '🐺' }
            ],
        };

        const COLORS = {
            grass1: '#6eb344', grass2: '#5e9c3a', river: '#309ec9', bridge: '#8b4513',
            blue: '#2196F3', red: '#F44336', elixir: '#f50057', gold: '#FFD700',
            uiBg: 'rgba(20, 20, 20, 0.95)',
            menuBg1: '#1b4169', menuBg2: '#163657', loadingBar: '#4CAF50'
        };

        // --- ADICIONE ESTE OBJETO DE BOTÕES ---
        const buttons = {
            battle: { x: W / 2 - 100, y: H / 2 + 50, w: 200, h: 70 }
        };

        // --- CONFIGURAÇÃO DA TELA DE CARREGAMENTO ---
        let loadingProgress = 0;
        let opacity = 0; // Para efeito de fade in inicial
        const bgLoading = new Image();
        bgLoading.src = 'https://i.pinimg.com/736x/fd/7a/bf/fd7abf8e304a4f6042b5e77b91834c05.jpg'; // Nome do arquivo da montanha

        const TROOP_STATS = {
            'Knight': { hp: 400, damage: 2, speed: 0.9, range: 35, icon: '⚔️' },
            'Giant': { hp: 1200, damage: 5, speed: 0.6, range: 45, icon: '🛡️' },
            'Archer': { hp: 200, damage: 1, speed: 1.0, range: 120, icon: '🏹' },
            'Fireball': { hp: 1, damage: 0, speed: 0, range: 0, icon: '🔥' },
            'Goblins': { hp: 230, damage: 3, speed: 1.1, range: 35, icon: '👺' },
            'Wolf': { hp: 420, damage: 4, speed: 1.2, range: 35, icon: '🐺' }
        };

        let troops = [];
        let towers = [
            { x: W / 2, y: arenaTop + 40, team: 'red', isKing: true, level: 10, hp: 2500, maxHp: 2500, isDestroyed: false },
            { x: arenaMargin + arenaW * 0.15 + 25, y: arenaTop + 100, team: 'red', isKing: false, level: 10, hp: 1500, maxHp: 1500, isDestroyed: false },
            { x: arenaMargin + arenaW * 0.85 - 25, y: arenaTop + 100, team: 'red', isKing: false, level: 10, hp: 1500, maxHp: 1500, isDestroyed: false },

            { x: W / 2, y: arenaTop + arenaH - 40, team: 'blue', isKing: true, level: 9, hp: 2500, maxHp: 2500, isDestroyed: false },
            { x: arenaMargin + arenaW * 0.15 + 25, y: arenaTop + arenaH - 100, team: 'blue', isKing: false, level: 9, hp: 1500, maxHp: 1500, isDestroyed: false },
            { x: arenaMargin + arenaW * 0.85 - 25, y: arenaTop + arenaH - 100, team: 'blue', isKing: false, level: 9, hp: 1500, maxHp: 1500, isDestroyed: false }
        ];

        class Troop {
            constructor(x, y, team, type) {
                this.x = x; this.y = y; this.team = team; this.type = type;
                this.stats = { ...TROOP_STATS[type] };
                this.hp = this.stats.hp;
                this.radius = 16;
                this.target = null;
            }

            update() {
                if (this.hp <= 0 || gamePhase === 'END') return;

                let enemies = [...towers.filter(t => t.team !== this.team && t.hp > 0), ...troops.filter(t => t.team !== this.team && t.hp > 0)];
                if (enemies.length === 0) return;

                this.target = enemies.reduce((closest, current) => {
                    return Math.hypot(this.x - closest.x, this.y - closest.y) < Math.hypot(this.x - current.x, this.y - current.y) ? closest : current;
                });

                const dist = Math.hypot(this.target.x - this.x, this.target.y - this.y);
                if (dist > this.stats.range) {
                    let moveX = this.target.x;
                    let moveY = this.target.y;
                    const riverY = arenaTop + arenaH / 2;
                    const onMySide = (this.team === 'blue' && this.y > riverY) || (this.team === 'red' && this.y < riverY);
                    const targetOnOtherSide = (this.team === 'blue' && this.target.y < riverY) || (this.team === 'red' && this.target.y > riverY);

                    if (onMySide && targetOnOtherSide) {
                        const leftBridgeX = arenaMargin + arenaW * 0.15 + 25;
                        const rightBridgeX = arenaMargin + arenaW * 0.85 - 25;
                        moveX = Math.abs(this.x - leftBridgeX) < Math.abs(this.x - rightBridgeX) ? leftBridgeX : rightBridgeX;
                        moveY = riverY;
                    }

                    const angle = Math.atan2(moveY - this.y, moveX - this.x);
                    this.x += Math.cos(angle) * this.stats.speed;
                    this.y += Math.sin(angle) * this.stats.speed;
                } else {
                    this.target.hp -= this.stats.damage;
                }

                this.x = Math.max(arenaMargin + this.radius, Math.min(W - arenaMargin - this.radius, this.x));
                this.y = Math.max(arenaTop + this.radius, Math.min(arenaTop + arenaH - this.radius, this.y));
            }

            draw() {
                ctx.fillStyle = this.team === 'blue' ? COLORS.blue : COLORS.red;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = '#000'; ctx.lineWidth = 2; ctx.stroke();
                ctx.fillStyle = 'white'; ctx.font = "16px Arial"; ctx.textAlign = "center";
                ctx.fillText(this.stats.icon, this.x, this.y + 6);
                ctx.fillStyle = 'black'; ctx.fillRect(this.x - 10, this.y - 22, 20, 4);
                ctx.fillStyle = this.team === 'blue' ? '#4CAF50' : '#f44336';
                ctx.fillRect(this.x - 10, this.y - 22, 20 * (Math.max(0, this.hp) / this.stats.hp), 4);
            }
        }

        // --- FUNÇÃO PARA PROCESSAR O FIM DA PARTIDA ---
        function endGame() {
            if (gamePhase === 'END') return; // Evita rodar duas vezes
            gamePhase = 'END';

            const isVictory = gameState.blueScore > gameState.redScore;
            const playerTowersLeft = towers.filter(t => t.team === 'blue' && t.hp > 0).length;
            const totalCoroas = gameState.blueScore + playerTowersLeft;

            // Cálculos de Recompensa
            if (isVictory) {
                const moedas = 150 + (totalCoroas * 10);

                // Atualizando os dados do jogador (UMA ÚNICA VEZ)
                playerData.wins += 1;
                playerData.gold += moedas;
                playerData.crown += totalCoroas;
                playerData.exp += 30; // Ganha um pouco de exp
                playerData.trofeus += 30; // Ganha troféus

                // Exemplo de como dar um baú se houver espaço
                if (playerData.chest.length < 4) {
                    playerData.chest.push({ id: Date.now(), type: 'comum', name: 'Baú de Prata' });
                }

                // Salva as moedas e coroas ganhas no gameState para a tela de resultados exibir
                gameState.lastReward = { moedas, coroas: totalCoroas };

            } else {
                const moedas = 30 + (gameState.blueScore * 15);
                playerData.gold += moedas;
                playerData.crown += gameState.blueScore; // Só ganha as coroas que derrubou
                playerData.trofeus = Math.max(0, playerData.trofeus - 20); // Perde troféus, mas não fica negativo

                gameState.lastReward = { moedas, coroas: gameState.blueScore };
            }
        }

        // --- LÓGICA DE GERENCIAMENTO DA PARTIDA ---
        function checkTowers() {
            towers.forEach(t => {
                if (t.hp <= 0 && !t.isDestroyed) {
                    t.isDestroyed = true;
                    if (t.team === 'red') {
                        gameState.blueScore += t.isKing ? 3 : 1;
                        if (t.isKing) gameState.blueScore = 3;
                    } else {
                        gameState.redScore += t.isKing ? 3 : 1;
                        if (t.isKing) gameState.redScore = 3;
                    }
                    if (gamePhase === 'OVERTIME' || gamePhase === 'TIEBREAKER' || t.isKing) {
                        endGame(); // Chama a nova função aqui
                    }
                }
            });
        }

        function updateGameLogic() {
            let now = Date.now();
            let dt = now - lastTime;
            lastTime = now;

            if (gamePhase === 'END') return;

            if (gamePhase === 'NORMAL' || gamePhase === 'OVERTIME') {
                timeAccumulator += dt;
                if (timeAccumulator >= 1000) {
                    gameState.timer--;
                    timeAccumulator -= 1000;

                    if (gameState.timer <= 0) {
                        if (gamePhase === 'NORMAL') {
                            if (gameState.blueScore !== gameState.redScore) {
                                endGame(); // Chama a nova função aqui
                            } else {
                                gamePhase = 'OVERTIME';
                                gameState.timer = 30;
                            }
                        } else if (gamePhase === 'OVERTIME') {
                            gamePhase = 'TIEBREAKER';
                        }
                    }
                }
            }

            if (gamePhase === 'TIEBREAKER') {
                towers.forEach(t => {
                    if (t.hp > 0) t.hp -= 5;
                });
            }

            checkTowers();

            if (gameState.elixir < 10) gameState.elixir += 0.02;
        }

        // --- INPUT DE JOGADOR ---
        canvas.addEventListener('pointerdown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const x = (e.clientX - rect.left) * scaleX;
            const y = (e.clientY - rect.top) * scaleY;

            if (currentScreen === 'LOADING') {
                // Coordenadas do botão cancelar definidas na função draw
                const btnX = (W - 160) / 2;
                const btnY = (H * 0.75) + 60;

                if (x > btnX && x < btnX + 160 && y > btnY && y < btnY + 45) {
                    loadingProgress = 0;
                    currentScreen = 'MAIN_MENU'; // Volta ao menu se cancelar
                }
                return;
            }

            // ===== LÓGICA DA TELA INICIAL =====
            if (currentScreen === 'MAIN_MENU') {
                // Coordenadas do Botão Batalha desenhado no Menu
                const btnW = 200;
                const btnH = 70;
                const btnX = W / 2 - btnW / 2;
                const btnY = H / 2 + 50;

                // Clicou no botão de batalha?
                if (x > btnX && x < btnX + btnW && y > btnY && y < btnY + btnH) {
                    loadingProgress = 0; // Resetar progresso
                    currentScreen = 'LOADING'; // Vai para o loading antes da batalha
                }
                return; // Impede que o clique faça outras coisas
            }

            // ===== LÓGICA DA BATALHA (Seu código original) =====
            if (currentScreen === 'BATTLE') {
                const deckState = getDeckState();

                if (gamePhase === 'END') {
                    const btnY = H - 150;
                    const btnW = 160;
                    const btnH = 50;
                    if (x > (W / 2 - btnW / 2) && x < (W / 2 + btnW / 2) &&
                        y > (btnY - btnH / 2) && y < (btnY + btnH / 2)) {
                        resetGameToMenu();
                    }
                    return;
                }

                // Seleção de Carta na Mão
                if (y > H - 160) {
                    deckState.hand.forEach((card, i) => {
                        const cardX = 85 + (i * 82), cardY = H - 110;
                        if (x >= cardX && x <= cardX + 75 && y >= cardY && y <= cardY + 100) {
                            gameState.selectedCardId = card.id; // Armazena o ID da carta
                        }
                    });
                    return;
                }

                // Drop da Carta na Arena
                const riverY = arenaTop + arenaH / 2;
                if (gameState.selectedCardId !== null && y > riverY && y < arenaTop + arenaH && x > arenaMargin && x < W - arenaMargin) {

                    // CORREÇÃO: Encontra a carta no battleDeck (estado atual da partida)
                    const card = gameState.battleDeck.find(c => c.id === gameState.selectedCardId);

                    if (card && gameState.elixir >= card.cost) {
                        troops.push(new Troop(x, y, 'blue', card.name));
                        gameState.elixir -= card.cost;

                        const usedSlot = card.slot; // Agora pega o slot correto embaralhado!

                        // Rotação apenas no deck da partida
                        gameState.battleDeck.forEach(c => {
                            if (c.id === gameState.selectedCardId) {
                                c.slot = 6;
                            } else if (c.slot > usedSlot) {
                                c.slot -= 1;
                            }
                        });

                        gameState.selectedCardId = null;
                    }
                }
            }
        });

        // --- FUNÇÃO PARA DESENHAR A TELA DE CARREGAMENTO ---
        function drawLoadingScreen() {
            // 1. Desenhar Fundo (Imagem ou cor caso falhe)
            if (bgLoading.complete) {
                ctx.drawImage(bgLoading, 0, 0, W, H);
            } else {
                ctx.fillStyle = '#001a33';
                ctx.fillRect(0, 0, W, H);
            }

            // 2. Overlay escuro para destacar o texto
            ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
            ctx.fillRect(0, 0, W, H);

            // 3. Barra de Carregamento
            const barW = 300;
            const barH = 20;
            const barX = (W - barW) / 2;
            const barY = H * 0.75;

            // Fundo da barra
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW, barH, 10);
            ctx.fill();

            // Progresso
            ctx.fillStyle = COLORS.blue;
            ctx.beginPath();
            ctx.roundRect(barX, barY, barW * (loadingProgress / 100), barH, 10);
            ctx.fill();

            // Texto de Porcentagem
            ctx.fillStyle = "white";
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.fillText(`${Math.floor(loadingProgress)}%`, W / 2, barY - 10);

            // 4. Botão Cancelar
            const btnW = 160;
            const btnH = 45;
            const btnX = (W - btnW) / 2;
            const btnY = barY + 60;

            ctx.fillStyle = COLORS.red;
            ctx.strokeStyle = "white";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.roundRect(btnX, btnY, btnW, btnH, 10);
            ctx.fill();
            ctx.stroke();

            ctx.fillStyle = "white";
            ctx.font = "bold 18px Arial";
            ctx.fillText("CANCELAR", W / 2, btnY + 28);

            // Lógica de Progressão
            if (loadingProgress < 100) {
                loadingProgress += 0.8; // Velocidade do carregamento
            } else {
                initializeBattleDeck();
                currentScreen = 'BATTLE'; // Transição ao chegar em 100%
                lastTime = Date.now();
            }
        }

        function getProcessedPlayerData() {
            // Cálculo de XP (ex: cada nível precisa de level * 50 de exp)
            const nextLevelExp = playerData.level * 100; // Aumentei um pouco para escala
            const expPercentage = (playerData.exp / nextLevelExp);

            // Progresso de Treinamento (vitórias / 7)
            const trainingProgress = playerData.wins / 7;

            // --- VERIFICAÇÃO DA ARENA ---
            // Se for 0, o nome é "TREINAMENTO", caso contrário, "ARENA " + o número
            const arenaName = playerData.arena === 0 ? "TREINAMENTO" : "ARENA " + playerData.arena;

            return {
                ...playerData,
                nextLevelExp,
                expPercentage,
                trainingProgress,
                arenaName, // Novo campo processado
                clanName: playerData.clan || 'SEM CLÃ',
                chestSlots: Array.from({ length: 4 }, (_, i) => playerData.chest[i] || null)
            };
        }

        function drawMainMenu() {
            const player = getProcessedPlayerData(); // Processa os dados antes de desenhar

            // 1. Fundo Quadriculado Azul (Mantido igual)
            const tileSize = 45;
            for (let y = 0; y < H; y += tileSize) {
                for (let x = 0; x < W; x += tileSize) {
                    ctx.fillStyle = ((Math.floor(x / tileSize) + Math.floor(y / tileSize)) % 2 === 0) ? COLORS.menuBg1 : COLORS.menuBg2;
                    ctx.fillRect(x, y, tileSize, tileSize);
                    ctx.strokeStyle = 'rgba(0,0,0,0.1)';
                    ctx.strokeRect(x, y, tileSize, tileSize);
                }
            }

            // 2. Barra Superior (Top Bar)
            ctx.fillStyle = '#0f171e';
            ctx.fillRect(0, 0, W, 40);

            // Nível (DINÂMICO)
            ctx.fillStyle = '#4db8ff';
            ctx.beginPath();
            ctx.arc(30, 20, 15, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 16px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(player.level, 30, 26); // Nível do jogador

            // Barra XP (DINÂMICO)
            ctx.fillStyle = '#222';
            ctx.fillRect(55, 12, 80, 16);
            ctx.fillStyle = '#2196F3';
            ctx.fillRect(55, 12, 80 * player.expPercentage, 16); // Largura baseada na %
            ctx.fillStyle = 'white';
            ctx.font = 'bold 10px Arial';
            ctx.fillText(`${player.exp}/${player.nextLevelExp}`, 95, 24);

            // Ouro e Gemas (DINÂMICO)
            ctx.textAlign = 'right';
            ctx.font = 'bold 14px Arial';
            ctx.fillStyle = 'white';
            ctx.fillText(`${player.gold} 🪙`, W - 110, 25);
            ctx.fillText(`${player.diamant} 💎`, W - 20, 25);

            // 3. Perfil (DINÂMICO)
            ctx.textAlign = 'left';
            ctx.fillStyle = 'rgba(0,0,0,0.4)';
            ctx.fillRect(0, 40, W, 60);
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.fillText('👤', 20, 80);
            ctx.font = 'bold 16px Arial';
            ctx.fillText(player.userName, 60, 65);
            ctx.fillStyle = '#aaa';
            ctx.font = '12px Arial';
            ctx.fillText(player.clanName, 60, 85);
            ctx.fillStyle = 'white';
            ctx.font = '24px Arial';
            ctx.fillText('⚙️', W - 45, 80);

            // 4. Progresso de Treinamento (DINÂMICO)
            ctx.textAlign = 'center';
            ctx.fillStyle = '#4db8ff';
            ctx.font = 'bold 12px Arial';
            ctx.fillText('Progresso do treinamento', W / 2, 130);

            // Barra de treino dinâmica
            ctx.fillStyle = '#222';
            ctx.beginPath(); ctx.roundRect(W / 2 - 100, 155, 200, 15, 8); ctx.fill();
            ctx.fillStyle = '#4db8ff';
            ctx.beginPath();
            ctx.roundRect(W / 2 - 100, 155, 200 * player.trainingProgress, 15, 8); // Progresso real
            ctx.fill();

            ctx.fillStyle = 'white';
            ctx.font = 'bold 10px Arial';
            ctx.fillText(`${player.wins}/7`, W / 2, 166);
            ctx.fillText('A prova Final', W / 2, 185);

            // 5. Arena Preview (Centro)
            const arenaY = 220;
            ctx.fillStyle = '#4a3a2a';
            ctx.beginPath(); ctx.roundRect(W / 2 - 110, arenaY, 220, 160, 15); ctx.fill();
            ctx.fillStyle = '#5e9c3a'; // Gramado
            ctx.beginPath(); ctx.roundRect(W / 2 - 105, arenaY - 15, 210, 150, 15); ctx.fill();
            // Rio
            ctx.fillStyle = COLORS.river;
            ctx.fillRect(W / 2 - 10, arenaY - 15, 20, 150);
            // Pontes
            ctx.fillStyle = COLORS.bridge;
            ctx.fillRect(W / 2 - 15, arenaY + 30, 30, 15);
            ctx.fillRect(W / 2 - 15, arenaY + 80, 30, 15);
            // Árvores e detalhes (simbólico)
            ctx.font = '30px Arial';
            ctx.fillText('🌲', W / 2 + 60, arenaY + 20);
            ctx.fillText('🎯', W / 2 + 70, arenaY + 70);
            ctx.fillText('🪵', W / 2 - 60, arenaY + 40);

            // Título da Arena
            ctx.fillStyle = '#2c3e50';
            ctx.beginPath(); ctx.roundRect(W / 2 - 90, arenaY + 130, 180, 25, 5); ctx.fill();
            ctx.fillStyle = 'white';
            ctx.font = 'bold 14px Arial';
            ctx.fillText(player.arenaName, W / 2, arenaY + 148);

            // 6. Botão Batalla
            const btn = buttons.battle;
            // Sombra do botão
            ctx.fillStyle = '#b8860b';
            ctx.beginPath(); ctx.roundRect(btn.x, btn.y + 5, btn.w, btn.h, 10); ctx.fill();
            // Corpo do botão
            ctx.fillStyle = '#ffd700';
            ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h, 10); ctx.fill();
            // Brilho superior
            ctx.fillStyle = 'rgba(255, 255, 255, 0.3)';
            ctx.beginPath(); ctx.roundRect(btn.x, btn.y, btn.w, btn.h / 2, 10); ctx.fill();

            ctx.fillStyle = 'white';
            ctx.strokeStyle = 'black';
            ctx.lineWidth = 4;
            ctx.font = 'bold 24px Arial';
            ctx.strokeText('Batalla', W / 2, btn.y + 42);
            ctx.fillText('Batalha', W / 2, btn.y + 42);

            // 7. Slots de Baús (DINÂMICO baseado no array de baús do jogador)
            const slotW = 85;
            const slotH = 110;
            const slotY = 620;
            const spacing = (W - (slotW * 4)) / 5;

            player.chestSlots.forEach((bau, i) => {
                let x = spacing + i * (slotW + spacing);

                if (bau) {
                    // Slot com baú existente
                    ctx.fillStyle = '#f9e79f';
                    ctx.beginPath(); ctx.roundRect(x, slotY, slotW, slotH, 5); ctx.fill();
                    ctx.fillStyle = '#5d4037';
                    ctx.font = 'bold 10px Arial';
                    ctx.fillText(bau.name.toUpperCase(), x + slotW / 2, slotY + 20);
                    ctx.font = '40px Arial';
                    ctx.fillText('🧰', x + slotW / 2, slotY + 65);
                    ctx.fillStyle = 'black';
                    ctx.font = 'bold 12px Arial';
                    ctx.fillText('ABRIR', x + slotW / 2, slotY + slotH - 10);
                } else {
                    // Slot vazio
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.strokeStyle = 'rgba(0,0,0,0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.roundRect(x, slotY, slotW, slotH, 5); ctx.fill(); ctx.stroke();
                    ctx.fillStyle = 'rgba(255,255,255,0.4)';
                    ctx.font = 'bold 11px Arial';
                    ctx.fillText('Vazio', x + slotW / 2, slotY + slotH / 2);
                }
            });

            // 8. Barra de Navegação Inferior
            ctx.fillStyle = '#1c2833';
            ctx.fillRect(0, H - 70, W, 70);

            const navIcons = ['🛒', '🃏', '⚔️', '🛡️', '📺'];
            const navLabels = ['Loja', 'Deck', 'Batalha', 'Clã', 'Eventos'];
            const navSpacing = W / 5;

            for (let i = 0; i < 5; i++) {
                let x = (i * navSpacing) + (navSpacing / 2);
                let isSelected = i === 2; // Batalha selecionada

                if (isSelected) {
                    ctx.fillStyle = 'rgba(255,255,255,0.1)';
                    ctx.fillRect(i * navSpacing, H - 70, navSpacing, 70);
                }

                ctx.fillStyle = isSelected ? 'white' : '#888';
                ctx.font = '24px Arial';
                ctx.fillText(navIcons[i], x, H - 35);
                ctx.font = 'bold 10px Arial';
                ctx.fillText(navLabels[i], x, H - 15);
            }
        }

        // --- FUNÇÕES VISUAIS DA BATALHA ---
        function drawArena() {
            ctx.save(); ctx.translate(arenaMargin, arenaTop);
            const tileSize = 36;
            for (let y = 0; y < arenaH; y += tileSize) {
                for (let x = 0; x < arenaW; x += tileSize) {
                    ctx.fillStyle = ((Math.floor(x / tileSize) + Math.floor(y / tileSize)) % 2 === 0) ? COLORS.grass1 : COLORS.grass2;
                    ctx.fillRect(x, y, tileSize, tileSize);
                }
            }
            ctx.fillStyle = '#4a3a2a'; ctx.fillRect(0, arenaH / 2 - 15, arenaW, 30);
            ctx.fillStyle = COLORS.river; ctx.fillRect(0, arenaH / 2 - 8, arenaW, 16);
            ctx.fillStyle = 'rgba(210, 180, 140, 0.3)'; ctx.fillRect(arenaW * 0.15, 0, 50, arenaH); ctx.fillRect(arenaW * 0.85 - 50, 0, 50, arenaH);
            drawBridge(arenaW * 0.15 - 5, arenaH / 2 - 20); drawBridge(arenaW * 0.85 - 45, arenaH / 2 - 20);
            ctx.restore();
        }

        function drawBridge(x, y) {
            ctx.fillStyle = COLORS.bridge; ctx.fillRect(x, y, 60, 40);
            ctx.strokeStyle = '#5d2e0d'; ctx.lineWidth = 2; ctx.strokeRect(x, y, 60, 40);
        }

        function drawTower(x, y, team, isKing, level, hp, maxHp) {
            const size = isKing ? 55 : 45;
            ctx.save(); ctx.translate(x - size / 2, y - size / 2);
            ctx.fillStyle = '#7f8c8d'; ctx.strokeStyle = '#2c3e50'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.roundRect(0, 0, size, size, 8); ctx.fill(); ctx.stroke();
            ctx.fillStyle = COLORS.gold; ctx.beginPath();
            ctx.moveTo(size / 2 - 8, -8); ctx.lineTo(size / 2 + 8, -8); ctx.lineTo(size / 2, 0); ctx.fill();
            ctx.fillStyle = '#000'; ctx.font = "bold 10px Arial"; ctx.textAlign = "center"; ctx.fillText(level, size / 2, -10);
            ctx.font = isKing ? "28px Arial" : "22px Arial"; ctx.fillText(isKing ? (team === 'red' ? '👹' : '🤴') : '🏰', size / 2, size / 2 + 8);

            ctx.fillStyle = 'black'; ctx.fillRect(0, -20, size, 6);
            ctx.fillStyle = team === 'blue' ? COLORS.blue : COLORS.red;
            ctx.fillRect(0, -20, size * (Math.max(0, hp) / maxHp), 6);
            ctx.restore();
        }

        function resetGameToMenu() {
            // Volta para a tela inicial
            currentScreen = 'MAIN_MENU';

            // Reseta o estado da batalha
            gamePhase = 'NORMAL';
            gameState.elixir = 5;
            gameState.timer = 180;
            gameState.blueScore = 0;
            gameState.redScore = 0;
            gameState.selectedCardId = null;
            troops = []; // Limpa as tropas da tela

            // Reseta as torres
            towers.forEach(t => {
                t.hp = t.maxHp;
                t.isDestroyed = false;
            });
        }

        function drawEndScreen() {
            const isVictory = gameState.blueScore > gameState.redScore;
            const isDraw = gameState.blueScore === gameState.redScore;

            if (isVictory == true) { playerData.wins + 1; }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
            ctx.fillRect(0, 0, W, H);

            const gradient = ctx.createRadialGradient(W / 2, H / 3, 10, W / 2, H / 3, 300);
            gradient.addColorStop(0, isVictory ? 'rgba(41, 128, 185, 0.6)' : (isDraw ? 'rgba(127, 140, 141, 0.6)' : 'rgba(192, 57, 43, 0.6)'));
            gradient.addColorStop(1, 'transparent');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, W, H);

            ctx.textAlign = "center";
            ctx.font = "bold 45px Arial Black";
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#000';
            ctx.fillStyle = isVictory ? '#FFD700' : (isDraw ? '#bdc3c7' : '#e74c3c');

            const titleText = isVictory ? "VITÓRIA!" : (isDraw ? "EMPATE" : "DERROTA");
            ctx.strokeText(titleText, W / 2, 180);
            ctx.fillText(titleText, W / 2, 180);

            ctx.font = "bold 50px Arial";
            ctx.fillStyle = COLORS.blue;
            ctx.strokeText(gameState.blueScore, W / 2 - 80, 280);
            ctx.fillText(gameState.blueScore, W / 2 - 80, 280);
            ctx.font = "30px Arial";
            ctx.fillText("👑", W / 2 - 80, 325);

            ctx.fillStyle = 'white';
            ctx.font = "bold 40px Arial";
            ctx.fillText("-", W / 2, 275);

            ctx.font = "bold 50px Arial";
            ctx.fillStyle = COLORS.red;
            ctx.strokeText(gameState.redScore, W / 2 + 80, 280);
            ctx.fillText(gameState.redScore, W / 2 + 80, 280);
            ctx.font = "30px Arial";
            ctx.fillText("👑", W / 2 + 80, 325);

            const boxY = 400;
            ctx.fillStyle = '#2c3e50';
            ctx.strokeStyle = isVictory ? '#f1c40f' : '#7f8c8d';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.roundRect(40, boxY, W - 80, 180, 15);
            ctx.fill(); ctx.stroke();

            const moedas = gameState.lastReward ? gameState.lastReward.moedas : 0;
            const totalCoroas = gameState.lastReward ? gameState.lastReward.coroas : 0;

            ctx.fillStyle = "white";
            ctx.font = "bold 18px Arial";
            ctx.textAlign = "left";
            ctx.fillText("Recompensas:", 60, boxY + 35);
            ctx.font = "16px Arial";
            ctx.fillText("👑 Coroas ganhas: " + totalCoroas, 60, boxY + 75);
            ctx.fillStyle = '#f1c40f';
            ctx.fillText("💰 Ouro: +" + moedas, 60, boxY + 110);

            if (isVictory) {
                ctx.fillStyle = "#3498db";
                ctx.fillText("📦 Baú de Prata", 60, boxY + 145);
            } else {
                ctx.fillStyle = "#95a5a6";
                ctx.fillText("❌ Sem baú", 60, boxY + 145);
            }

            const btnY = H - 150;
            const time = Date.now() / 300;
            const scale = 1 + Math.sin(time) * 0.03;

            ctx.save();
            ctx.translate(W / 2, btnY);
            ctx.scale(scale, scale);

            ctx.fillStyle = '#3498db';
            ctx.shadowColor = 'rgba(0,0,0,0.5)';
            ctx.shadowBlur = 10;
            ctx.beginPath();
            ctx.roundRect(-80, -25, 160, 50, 10);
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            ctx.fillRect(-80, -25, 160, 20);

            ctx.strokeStyle = isVictory ? '#f1c40f' : '#2980b9';
            ctx.lineWidth = 3;
            ctx.stroke();

            ctx.fillStyle = 'white';
            ctx.font = "bold 20px Arial";
            ctx.textAlign = "center";
            ctx.fillText("OK", 0, 7);
            ctx.restore();
        }

        // FUNÇÃO PARA INICIAR O DECK DA PARTIDA
        function initializeBattleDeck() {
            // 1. Copiamos as cartas do playerData (sem o slot fixo)
            let tempDeck = playerData.deck.map(card => ({ ...card }));

            // 2. Algoritmo de Fisher-Yates para embaralhar aleatoriamente
            for (let i = tempDeck.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [tempDeck[i], tempDeck[j]] = [tempDeck[j], tempDeck[i]];
            }

            // 3. Atribuímos os slots de 1 a 6 baseados na nova ordem aleatória
            tempDeck.forEach((card, index) => {
                card.slot = index + 1;
            });

            gameState.battleDeck = tempDeck;
        }

        function getDeckState() {
            // Como agora usamos slots temporários na batalha, ordenamos eles
            const sorted = [...gameState.battleDeck].sort((a, b) => a.slot - b.slot);

            return {
                hand: sorted.filter(c => c.slot <= 4),
                next: sorted.find(c => c.slot === 5),
                queue: sorted.find(c => c.slot === 6)
            };
        }

        function drawUI() {
            const deckState = getDeckState();

            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, 70);
            ctx.fillStyle = COLORS.gold; ctx.font = "bold 16px Arial"; ctx.textAlign = "left"; ctx.fillText("TRAINER QUINCY", 20, 30);

            const minutes = Math.floor(gameState.timer / 60);
            const seconds = gameState.timer % 60;
            const timeStr = `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;

            ctx.fillStyle = (gamePhase === 'OVERTIME' || gamePhase === 'TIEBREAKER') ? 'rgba(200,0,0,0.8)' : 'rgba(0,0,0,0.8)';
            ctx.beginPath(); ctx.roundRect(W - 90, 15, 70, 25, 12); ctx.fill();
            ctx.fillStyle = "white"; ctx.font = "bold 14px Arial"; ctx.textAlign = "center"; ctx.fillText(timeStr, W - 55, 33);

            if (gamePhase === 'OVERTIME') {
                ctx.fillStyle = "#ff4757"; ctx.font = "10px Arial"; ctx.fillText("MORTE SÚBITA!", W / 2, 60);
            } else if (gamePhase === 'TIEBREAKER') {
                ctx.fillStyle = "#ff4757"; ctx.font = "12px Arial"; ctx.fillText("DESEMPATE!", W / 2, 60);
            }

            drawCrownCounter(W - 55, 280, gameState.redScore, COLORS.red);
            drawCrownCounter(W - 55, H - 435, gameState.blueScore, COLORS.blue);

            ctx.fillStyle = COLORS.uiBg; ctx.fillRect(0, H - 160, W, 160);
            const barX = 60, barY = H - 145, barW = W - 100;
            ctx.fillStyle = '#222'; ctx.beginPath(); ctx.roundRect(barX, barY, barW, 20, 10); ctx.fill();
            ctx.fillStyle = COLORS.elixir; ctx.beginPath(); ctx.roundRect(barX, barY, barW * (gameState.elixir / 10), 20, 10); ctx.fill();
            ctx.fillStyle = "white"; ctx.font = "bold 16px Arial"; ctx.textAlign = "left"; ctx.fillText("💧 " + Math.floor(gameState.elixir), 15, barY + 16);

            // 1. Desenhar a PRÓXIMA CARTA (Slot 5) - No canto esquerdo
            if (deckState.next) {
                drawCard(15, H - 95, deckState.next, true, false);
            }

            // 2. Desenhar a MÃO (Slots 1 a 4)
            deckState.hand.forEach((card, i) => {
                // i vai de 0 a 3. O slot original da carta define a posição na tela
                // Para manter a posição fixa na tela mesmo quando as cartas rodam:
                const posX = 85 + (i * 82);
                const posY = H - 110;

                // Verifica se esta carta específica é a selecionada
                // Usamos o ID para comparar, já que o índice do array muda
                const isSelected = gameState.selectedCardId === card.id;

                drawCard(posX, posY, card, false, isSelected);
            });
        }

        function drawCrownCounter(x, y, score, color) {
            ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.strokeStyle = color; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.roundRect(x, y, 40, 50, 8); ctx.fill(); ctx.stroke();
            ctx.fillStyle = "white"; ctx.font = "bold 20px Arial"; ctx.textAlign = "left"; ctx.fillText(score, x + 12, y + 25);
            ctx.font = "14px Arial"; ctx.fillText("👑", x + 10, y + 43);
        }

        function drawCard(x, y, card, isSmall, isSelected) {
            const w = isSmall ? 50 : 75, h = isSmall ? 65 : 100;
            ctx.fillStyle = '#5d6d7e'; ctx.strokeStyle = isSelected ? COLORS.gold : 'white'; ctx.lineWidth = isSelected ? 4 : 2;
            ctx.beginPath(); ctx.roundRect(x, y, w, h, 8); ctx.fill(); ctx.stroke(); ctx.lineWidth = 2;
            ctx.fillStyle = '#8e44ad'; ctx.beginPath(); ctx.arc(x, y, 10, 0, Math.PI * 2); ctx.fill();
            ctx.fillStyle = 'white'; ctx.font = "bold 10px Arial"; ctx.textAlign = "left"; ctx.fillText(card.cost, x - 3, y + 4);
            ctx.font = isSmall ? "22px Arial" : "36px Arial"; ctx.fillText(card.icon, x + w / 2 - (isSmall ? 11 : 18), y + h / 2 + (isSmall ? 8 : 12));
        }

        // --- NOVO LOOP PRINCIPAL COM SELEÇÃO DE TELA ---
        function render() {
            ctx.clearRect(0, 0, W, H);

            if (currentScreen === 'LOADING') {
                drawLoadingScreen();
            } else if (currentScreen === 'MAIN_MENU') {
                drawMainMenu(); // Renderiza o Menu
            }
            else if (currentScreen === 'BATTLE') {
                // Seu código original de renderizar a partida
                updateGameLogic();

                drawArena();

                towers.forEach(t => {
                    if (!t.isDestroyed) drawTower(t.x, t.y, t.team, t.isKing, t.level, t.hp, t.maxHp);
                });

                troops.forEach((t, index) => {
                    t.update();
                    t.draw();
                    if (t.hp <= 0) troops.splice(index, 1);
                });

                drawUI();

                if (gamePhase === 'END') {
                    drawEndScreen();
                }
            }

            requestAnimationFrame(render);
        }

        render();
    </script>
